<!DOCTYPE html>
<html lang="de" id="html-tag">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, follow"> <title id="page-title">Impressum - neuro / dev</title>

  <style>
    * { box-sizing: border-box; }
    :root {
      --bg-color: #FAFAFA; --card-bg: #FFFFFF; --text-color: #2D2D2D;
      --text-muted: #777777; --accent-primary: #00B4D8; --accent-secondary: #9D4EDD;
      --btn-bg: #00B4D8; --btn-text: #FFFFFF; --btn-hover: #9D4EDD; --border-color: #EEEEEE;
    }
    [data-theme="dark"] {
      --bg-color: #1A1A2E; --card-bg: #16213E; --text-color: #FFFFE0;
      --text-muted: #A0A0A0; --accent-primary: #03DAC6; --accent-secondary: #BB86FC;
      --btn-bg: #03DAC6; --btn-text: #1A1A2E; --btn-hover: #9D4EDD; --border-color: #2D2D2D;
    }
    body {
      background-color: var(--bg-color); color: var(--text-color);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center;
      line-height: 1.6; transition: background-color 0.3s ease, color 0.3s ease;
      width: 100%; min-height: 100vh; overflow-x: hidden;
    }
    .controls-container {
      width: 100%; max-width: 900px; display: flex; justify-content: space-between; align-items: center;
      padding: 20px 20px 0 20px;
    }
    .back-link {
      color: var(--text-color); text-decoration: none; font-weight: bold;
      display: flex; align-items: center; gap: 5px; transition: color 0.2s ease;
    }
    .back-link:hover { color: var(--accent-primary); }
    .control-group { display: flex; gap: 10px; }
    .control-btn {
      background-color: var(--card-bg); color: var(--text-color);
      border: 2px solid var(--accent-primary); border-radius: 50px;
      padding: 8px 16px; cursor: pointer; font-size: 1em; font-weight: bold;
      display: flex; align-items: center; gap: 8px; transition: all 0.2s ease;
    }
    .control-btn:hover { transform: scale(1.05); border-color: var(--accent-secondary); }
    .container { width: 100%; max-width: 900px; padding: 20px 20px 60px 20px; flex-grow: 1; }
    .legal-section {
      background-color: var(--card-bg); padding: 40px; border-radius: 16px;
      border: 1px solid var(--border-color); box-shadow: 0 4px 15px rgba(0,0,0,0.05);
    }
    .legal-section h1 { color: var(--accent-primary); margin-top: 0; }
    .legal-section h2 { color: var(--accent-secondary); margin-top: 30px; font-size: 1.2em; }
    footer {
      padding: 30px; font-size: 0.9em; text-align: center; width: 100%;
      border-top: 1px solid var(--border-color); color: var(--text-muted);
    }
    footer a { color: var(--text-muted); text-decoration: none; font-weight: bold; transition: color 0.2s ease; }
    footer a:hover { color: var(--accent-primary); }
  </style>
</head>
<body>

<div class="controls-container">
  <a href="index.html" class="back-link">← <span data-i18n="backBtn">Zurück</span></a>
  <div class="control-group">
    <button id="lang-btn" class="control-btn" aria-label="Sprache wechseln">🇬🇧 EN</button>
    <button id="theme-btn" class="control-btn" aria-label="Erscheinungsbild anpassen"><span id="theme-icon">🌓</span></button>
  </div>
</div>

<div class="container">
  <div class="legal-section" id="legal-content">
  </div>
</div>

<footer>
  <a href="index.html" data-i18n="footerText">© 2026 neuro / dev. Alle Rechte vorbehalten.</a>
</footer>

<script>
  const name = "[Dein Vorname] [Dein Nachname]";
  const street = "[Deine Straße und Hausnummer]";
  const city = "[Deine PLZ] Wustermark";
  const email = "[Deine E-Mail-Adresse]";

  const i18n = {
    de: {
      pageTitle: "Impressum - neuro / dev",
      backBtn: "Zurück",
      footerText: "© 2026 neuro / dev. Alle Rechte vorbehalten.",
      legalContent: `
                <h1>Impressum</h1>
                <h2>Angaben gemäß § 5 DDG</h2>
                <p>
                    ${name}<br>
                    neuro / dev<br>
                    ${street}<br>
                    ${city}<br>
                    Deutschland
                </p>
                <h2>Kontakt</h2>
                <p>E-Mail: ${email}</p>
                <h2>Verbraucher­streit­beilegung/Universal­schlichtungs­stelle</h2>
                <p>Wir sind nicht bereit oder verpflichtet, an Streitbeilegungsverfahren vor einer Verbraucherschlichtungsstelle teilzunehmen.</p>
            `
    },
    en: {
      pageTitle: "Legal Notice - neuro / dev",
      backBtn: "Back",
      footerText: "© 2026 neuro / dev. All rights reserved.",
      legalContent: `
                <h1>Legal Notice (Impressum)</h1>
                <h2>Information pursuant to § 5 DDG (German Digital Services Act)</h2>
                <p>
                    ${name}<br>
                    neuro / dev<br>
                    ${street}<br>
                    ${city}<br>
                    Germany
                </p>
                <h2>Contact</h2>
                <p>Email: ${email}</p>
                <h2>Dispute Resolution</h2>
                <p>We are not willing or obliged to participate in dispute resolution proceedings before a consumer arbitration board.</p>
            `
    }
  };

  const langBtn = document.getElementById('lang-btn');
  let currentLang = localStorage.getItem('lang') || (navigator.language.startsWith('de') ? 'de' : 'en');

  function applyLanguage(lang) {
    document.documentElement.lang = lang;
    document.getElementById('page-title').textContent = i18n[lang].pageTitle;
    langBtn.textContent = lang === 'de' ? '🇬🇧 EN' : '🇩🇪 DE';

    document.getElementById('legal-content').innerHTML = i18n[lang].legalContent;

    document.querySelectorAll('[data-i18n]').forEach(el => {
      const key = el.getAttribute('data-i18n');
      if (i18n[lang][key]) el.innerHTML = i18n[lang][key];
    });
  }

  langBtn.addEventListener('click', () => {
    currentLang = currentLang === 'de' ? 'en' : 'de';
    localStorage.setItem('lang', currentLang);
    applyLanguage(currentLang);
  });

  applyLanguage(currentLang);

  const themeBtn = document.getElementById('theme-btn');
  const root = document.documentElement;
  let currentTheme = localStorage.getItem('theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');

  function applyTheme(theme) {
    root.setAttribute('data-theme', theme);
    document.getElementById('theme-icon').textContent = theme === 'dark' ? '🌙' : '☀️';
  }

  themeBtn.addEventListener('click', () => {
    currentTheme = currentTheme === 'dark' ? 'light' : 'dark';
    localStorage.setItem('theme', currentTheme);
    applyTheme(currentTheme);
  });

  applyTheme(currentTheme);
</script>
</body>
</html>
